name: agenda_allan
description: Agenda pessoal com gamificação RPG para Allan Vinicius
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # Estado
  provider: ^6.1.1
  
  # Persistência
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Notificações
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.3
  
  # Datas
  intl: ^0.19.0
  table_calendar: ^3.1.0
  
  # Utils
  uuid: ^4.3.3
  crypto: ^3.0.3
  path_provider: ^2.1.2
  
  # Gráficos
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
